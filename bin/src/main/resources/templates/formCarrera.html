<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet"
	data-th-href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">

<title>Formulario Carreras</title>
</head>
<body>
	<div data-th-replace="~{fragments/header::navbar}"></div>
	<br>
	<div class="container">
		<h1>Formulario Carreras</h1>
		<form data-th-object="${nuevaCarrera}"
			data-th-action="${flag}?@{/modificarCarrera}:@{/guardarCarrera}"
			method="post">

			<div class="col-sm-6">
				<label for="codigo" class="form-label">Codigo</label> <input
					type="text" class="form-control" id="codigo"
					data-th-field="*{codigo}" data-th-readonly="${flag}" required>
			</div>

			<div class="col-sm-6">
				<label for="nombre" class="form-label">Nombre Carrera</label> <input
					type="text" class="form-control" id="nombre"
					data-th-field="*{nombre}" required>
			</div>

			<div class="col-sm-6">
				<label for="cantidadHoras" class="form-label">Cantidad Horas</label>
				<input type="number" class="form-control" id="cantidadHoras"
					data-th-field="*{cantidadHoras}" required>
			</div>
			<div class="col-sm-6">
				<label for="estadoCarrera" class="form-label mt-1">Estado</label><br>
				<select class="form-select" id="estadoCarrera"
					data-th-field="*{estado}">
					<option value="true">True</option>
					<option value="false">False</option>
				</select>
			</div>

			<br>

			<div>
				<button type="submit" class="btn btn-primary">Guardar
					Carrera</button>
				<a class="btn btn-secondary" href="/carreras">Ver listado de
					Carreras</a>
			</div>
		</form>
	</div>
	<br>
	<br>
	<div data-th-replace="~{fragments/footer::footer}"></div>
	<script
		data-th-src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
